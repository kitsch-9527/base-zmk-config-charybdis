CONFIG_ZMK_KEYBOARD_NAME="Charybdis"

# Bluetooth Security - Require passkey during pairing
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# --- 蓝牙连接优化（平衡点：15ms 延迟，低功耗） ---
# 12 * 1.25ms = 15ms，这是续航与顺滑感的黄金分割点
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# --- 传感器性能微调 (基于 PMW3610 驱动) ---

# 1. 上报频率设为 12ms (约 83Hz)
# 匹配上面的蓝牙间隔（12ms），确保每一帧数据都能立即发出，不堆积不掉帧
CONFIG_PMW3610_REPORT_INTERVAL_MS=12

# 2. 延长高性能模式维持时间
# 设为 2秒，防止在你打字停顿的瞬间轨迹球就进入省电模式导致接下来的移动卡顿
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=2000

# 3. 优化省电模式1 (Rest 1)
# 当你不动球 2秒后进入此模式。设为 16ms 采样一次，
# 这样即便在省电模式下唤醒，第一感官延迟也仅有 16ms，肉眼几乎难察觉
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=16

# 4. 优化省电模式2 (Rest 2)
# 深度睡眠前的过渡，设为 48ms 兼顾极低功耗
CONFIG_PMW3610_ALT_REST2_SAMPLE_TIME_MS=48

# --- 其他辅助 ---
# 开启平滑处理，减少蓝牙丢包感
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
