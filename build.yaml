---
include:
# 左手键盘 - 所有模式相同（始终为外设）
- board: nice_nano//zmk
  shield: charybdis_left

# 独立模式 - 右手键盘为主/中心设备
- board: nice_nano//zmk
  shield: charybdis_right_standalone
  snippet: studio-rpc-usb-uart
  cmake-args: -DCONFIG_ZMK_STUDIO=y

# Dongle 模式 - prospector dongle 为主/中心设备（带显示屏），右手为外设
# - board: nice_nano//zmk
#   shield: dongle_charybdis_right
# - board: xiao_ble//zmk
#   shield: dongle_prospector prospector_adapter
#   snippet: studio-rpc-usb-uart
#   cmake-args: -DCONFIG_ZMK_STUDIO=y
# YADS Prospector dongle - 禁用，等待 zmk-dongle-screen Zephyr 4.1 修复
# See: https://github.com/janpfischer/zmk-dongle-screen/issues/29
# - board: xiao_ble
#   shield: dongle_yads_prospector dongle_screen
#   snippet: studio-rpc-usb-uart
#   cmake-args: -DCONFIG_ZMK_STUDIO=y

# Dongle 模式 - nice_nano dongle 带 OLED 显示屏
# - board: nice_nano//zmk
#   shield: dongle_nice_32 dongle_display
#   snippet: studio-rpc-usb-uart
#   cmake-args: -DCONFIG_ZMK_STUDIO=y
# - board: nice_nano//zmk
#   shield: dongle_nice_64 dongle_display
#   snippet: studio-rpc-usb-uart
#   cmake-args: -DCONFIG_ZMK_STUDIO=y

# 两种板型的设置重置
- board: nice_nano//zmk
  shield: settings_reset
# - board: xiao_ble//zmk
#   shield: settings_reset

